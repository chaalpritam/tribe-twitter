name: TribeIOS
options:
  bundleIdPrefix: app.tribe
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

targets:
  TribeIOS:
    type: application
    platform: iOS
    sources:
      - path: TribeIOS
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tribe.ios
        INFOPLIST_FILE: TribeIOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"TribeIOS/Preview Content\""
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
